<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>BOGGY Trait Analyzer</title>
<style>
body { font-family: Arial; padding: 20px; background: #f5f5f5; }
input, button { padding: 8px; margin: 6px 0; width: 420px; }
pre { background: #fff; padding: 10px; border: 1px solid #ccc; }
</style>
<script src="https://cdn.jsdelivr.net/npm/ethers@6.10.0/dist/ethers.umd.min.js"></script>
</head>
<body>

<h2>BOGGY Trait Analyzer</h2>
<p>輸入錢包地址：</p>
<input id="wallet">
<br>
<button onclick="analyze()">Analyze</button>
<pre id="output"></pre>

<script>
const API_KEY = "MZC4TKJ9ZCDGCQF9TJC78SF2IZFXVJJEF5"; // <-- 你的 Etherscan API Key
const CHAIN_ID = 33139; // ApeChain
const BOGGY_CONTRACT = "0x5d0563ff947f4ed596a4dAa6F2BE00f4f326b0bc";
const gateways = [
  "https://ipfs.io/ipfs/",
  "https://cloudflare-ipfs.com/ipfs/"
];

function ipfsToHttp(uri){
  return uri.startsWith("ipfs://") ? uri.replace("ipfs://","") : uri;
}

async function fetchIPFS(cid){
  for(const g of gateways){
    try{
      const r = await fetch(g + cid);
      if(r.ok) return r.json();
    }catch{}
  }
  throw new Error("IPFS 讀取失敗");
}

async function getNFTTransactions(wallet){
  const url = `https://api.etherscan.io/api?module=account&action=tokennfttx&address=${wallet}&startblock=0&endblock=99999999&sort=asc&apikey=${API_KEY}&chainid=${CHAIN_ID}`;
  const res = await fetch(url);
  const data = await res.json();
  if(data.status !== "1") return [];
  return data.result.filter(tx => tx.contractAddress.toLowerCase() === BOGGY_CONTRACT.toLowerCase());
}

async function analyze(){
  const wallet = document.getElementById("wallet").value.trim();
  if(!wallet) return alert("請輸入錢包地址");
  const out = document.getElementById("output");
  out.textContent = "分析中，請稍候（第一次會慢）...";

  try{
    const txs = await getNFTTransactions(wallet);
    if(txs.length === 0){
      out.textContent = "該錢包沒有 BOGGY NFT";
      return;
    }

    // 計算持有的 tokenId
    const received = txs.filter(t=>t.to.toLowerCase()===wallet.toLowerCase()).map(t=>t.tokenID);
    const sentSet = new Set(txs.filter(t=>t.from.toLowerCase()===wallet.toLowerCase()).map(t=>t.tokenID));
    const owned = received.filter(id => !sentSet.has(id));

    const traits = {};

    for(const id of owned){
      try{
        const tokenUriRes = await fetch(`https://api.etherscan.io/api?module=token&action=tokenURI&contractaddress=${BOGGY_CONTRACT}&tokenid=${id}&apikey=${API_KEY}&chainid=${CHAIN_ID}`);
        const tokenUriData = await tokenUriRes.json();
        let uri = tokenUriData.result;
        if(!uri) continue;
        const meta = await fetchIPFS(ipfsToHttp(uri));
        if(!meta.attributes) continue;
        for(const a of meta.attributes){
          const key = `${a.trait_type}: ${a.value}`;
          traits[key] = (traits[key]||0)+1;
        }
      }catch{}
    }

    let result = `錢包：${wallet}\nBOGGY 數量：${owned.length}\n\nTraits:\n`;
    for(const k in traits) result += `${k} → ${traits[k]}\n`;
    out.textContent = result;

  }catch(e){
    out.textContent = "分析失敗：" + e.message;
  }
}
</script>
</body>
</html>
