<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>BOGGY Trait Analyzer</title>
<script src="https://cdn.jsdelivr.net/npm/ethers@6.10.0/dist/ethers.umd.min.js"></script>
<style>
body { font-family: Arial; padding: 20px; background: #f5f5f5; }
input, button { padding: 8px; margin: 6px 0; }
pre { background: #fff; padding: 10px; border: 1px solid #ccc; }
</style>
</head>
<body>

<h2>BOGGY Trait Analyzer</h2>
<p>輸入錢包地址：</p>
<input id="wallet" style="width:420px">
<br>
<button onclick="analyze()">Analyze</button>

<pre id="output"></pre>

<script>
const RPC = "https://rpc.ankr.com/ape_chain";
const CONTRACT = "0x5d0563ff947f4ed596a4dAa6F2BE00f4f326b0bc";

const ABI = [
  "event Transfer(address indexed from, address indexed to, uint256 indexed tokenId)",
  "function tokenURI(uint256 tokenId) view returns (string)"
];

const gateways = [
  "https://ipfs.io/ipfs/",
  "https://cloudflare-ipfs.com/ipfs/"
];

function ipfsToHttp(uri) {
  return uri.startsWith("ipfs://")
    ? uri.replace("ipfs://", "")
    : uri;
}

async function fetchIPFS(cid) {
  for (const g of gateways) {
    try {
      const r = await fetch(g + cid);
      if (r.ok) return r.json();
    } catch {}
  }
  throw new Error("IPFS 讀取失敗");
}

async function analyze() {
  const wallet = document.getElementById("wallet").value.trim();
  if (!wallet) return alert("請輸入錢包");

  const out = document.getElementById("output");
  out.textContent = "分析中，請稍候（第一次會慢）...";

  try {
    const provider = new ethers.JsonRpcProvider(RPC);
    const contract = new ethers.Contract(CONTRACT, ABI, provider);

    const recv = await contract.queryFilter(
      contract.filters.Transfer(null, wallet)
    );
    const sent = await contract.queryFilter(
      contract.filters.Transfer(wallet, null)
    );

    const owned = recv
      .map(e => e.args.tokenId.toString())
      .filter(id => !new Set(sent.map(e => e.args.tokenId.toString())).has(id));

    const traits = {};

    for (const id of owned) {
      const uri = await contract.tokenURI(id);
      const meta = await fetchIPFS(ipfsToHttp(uri));
      if (!meta.attributes) continue;

      for (const a of meta.attributes) {
        const key = `${a.trait_type}: ${a.value}`;
        traits[key] = (traits[key] || 0) + 1;
      }
    }

    let result = `錢包：${wallet}\nBOGGY 數量：${owned.length}\n\nTraits:\n`;
    for (const k in traits) result += `${k} → ${traits[k]}\n`;

    out.textContent = result;

  } catch (e) {
    out.textContent = "分析失敗：" + e.message;
  }
}
</script>

</body>
</html>
