<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>BOGGY Trait Analyzer</title>
<style>
body { font-family: Arial; padding: 20px; background: #f5f5f5; }
input, button { padding: 8px; margin: 6px 0; width: 420px; }
pre { background: #fff; padding: 10px; border: 1px solid #ccc; white-space: pre-wrap; }
</style>
</head>
<body>

<h2>BOGGY Trait Analyzer</h2>

<p>輸入錢包地址：</p>
<input id="wallet" placeholder="0x...">
<br>
<button onclick="analyze()">Analyze</button>

<pre id="output"></pre>

<script>
const BOGGY_CONTRACT = "0x5d0563ff947f4ed596a4dAa6F2BE00f4f326b0bc";
const gateways = ["https://ipfs.io/ipfs/", "https://cloudflare-ipfs.com/ipfs/"];

// IPFS URI 轉 HTTP
function ipfsToHttp(uri){
  return uri.startsWith("ipfs://") ? uri.replace("ipfs://","") : uri;
}

// 從 IPFS 讀 JSON
async function fetchIPFS(cid){
  for(const g of gateways){
    try{
      const r = await fetch(g + cid);
      if(r.ok) return r.json();
    }catch{}
  }
  throw new Error("IPFS 讀取失敗");
}

// 取得錢包 BOGGY NFT
async function getNFTs(wallet){
  const url = `https://api.apescan.io/v1/nft/owned?address=${wallet}&chain_id=33139`; // ApeChain chainID
  const res = await fetch(url);
  if(!res.ok) throw new Error("ApeScan API 請求失敗");
  const data = await res.json();
  // 過濾 BOGGY NFT
  return data.data ? data.data.filter(nft => nft.contract_address.toLowerCase() === BOGGY_CONTRACT.toLowerCase()) : [];
}

// 分析函式
async function analyze(){
  const wallet = document.getElementById("wallet").value.trim();
  if(!wallet) return alert("請輸入錢包地址");

  const out = document.getElementById("output");
  out.textContent = "分析中，請稍候...";

  try{
    const nfts = await getNFTs(wallet);
    if(nfts.length === 0){
      out.textContent = "該錢包沒有 BOGGY NFT";
      return;
    }

    const traits = {};
    for(const nft of nfts){
      if(!nft.token_uri) continue;
      try{
        const meta = await fetchIPFS(ipfsToHttp(nft.token_uri));
        if(!meta.attributes) continue;
        for(const a of meta.attributes){
          const key = `${a.trait_type}: ${a.value}`;
          traits[key] = (traits[key]||0)+1;
        }
      }catch{}
    }

    let result = `錢包：${wallet}\nBOGGY NFT 數量：${nfts.length}\n\nTraits 統計:\n`;
    for(const k in traits) result += `${k} → ${traits[k]}\n`;
    out.textContent = result;

  }catch(e){
    out.textContent = "分析失敗：" + e.message;
  }
}
</script>

</body>
</html>
